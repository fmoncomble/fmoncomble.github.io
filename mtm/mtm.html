<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <link rel="stylesheet" href="mtm.css" type="text/css" />
        <script src="mtm.js" type="text/javascript"></script>
    </head>

    <body>
        <div id="page-title">
            <h1>Mastodon Thread Maker</h1>
        </div>
        <div id="instance-div">
            <div id="instance-input-div">
                <span>https:// </span>
                <input
                    id="instance-input"
                    type="text"
                    placeholder="Instance Mastodon"
                />
                <button id="instance-btn">Valider</button>
            </div>
            <div id="auth-div" style="display: none">
                <div>
                    <input
                        id="client-id-input"
                        type="text"
                        placeholder="ID de l'application"
                    />
                    <button id="save-id-btn">Valider</button>
                </div>
                <div>
                    <input
                        id="client-secret-input"
                        type="text"
                        placeholder="Secret"
                    />
                    <button id="save-secret-btn">Valider</button>
                </div>
                <div>
                    <input id="code-input" type="text" placeholder="Code" />
                    <button id="save-code-btn">Valider</button>
                </div>
            </div>
        </div>
        <div id="content-container">
            <div id="post-item" class="post-item" style="display: none">
                <div class="post-count"></div>
                <div class="textarea">
                    <textarea placeholder="Tapez votre texte ici"></textarea>
                </div>
                <div class="char-count"></div>
                <div class="dropzone">
                    <div class="dz-inst">Glissez-déposer vos images ici</div>
                    <div class="img-preview"></div>
                </div>
                <div class="img-count"></div>
                <button class="add-post-btn">Ajouter un pouet</button>
                <button class="delete-post-btn" style="display: none">
                    Supprimer le pouet
                </button>
            </div>
        </div>
        <button id="post-thread-btn" style="display: none">
            Poster le fil
        </button>
        <div id="view-thread-btn" style="display: none">
            <a target="_blank">Voir le fil</a>
        </div>
    </body>
</html>
